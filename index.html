<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سورننت - قالب‌ها و افزونه‌های پریمیوم وردپرس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'primary': '#0B0D17',
              'secondary': '#1C1E2D',
              'accent': '#3671E9',
              'accent-hover': '#2A5ABC',
              'gray-text': '#C1C5D6',
              'neon-purple': '#c026d3',
            },
            fontFamily: {
              sans: ['Vazirmatn', 'sans-serif'],
            },
            boxShadow: {
                'glow-accent': '0 0 20px 0px rgba(54, 113, 233, 0.6)',
                'glow-purple': '0 0 20px 0px rgba(192, 38, 211, 0.6)',
            },
            keyframes: {
                'fade-in-up': {
                    '0%': { opacity: '0', transform: 'translateY(20px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' },
                },
            },
            animation: {
                'fade-in-up': 'fade-in-up 0.8s ease-out forwards',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom styles for the luminous price slider */
      input[type=range].luminous-slider {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }
      input[type=range].luminous-slider:focus {
        outline: none;
      }
      /* Thumb */
      input[type=range].luminous-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        margin-top: -7px;
        box-shadow: 0 0 10px 0px rgba(54, 113, 233, 0.8);
        border: 2px solid #3671E9;
      }
      input[type=range].luminous-slider::-moz-range-thumb {
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        box-shadow: 0 0 10px 0px rgba(54, 113, 233, 0.8);
        border: 2px solid #3671E9;
      }
      /* Track */
      input[type=range].luminous-slider::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: #3671E9;
        border-radius: 3px;
        box-shadow: 0 0 5px 0px rgba(54, 113, 233, 0.6);
      }
       input[type=range].luminous-slider::-moz-range-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: #3671E9;
        border-radius: 3px;
        box-shadow: 0 0 5px 0px rgba(54, 113, 233, 0.6);
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react/": "https://esm.sh/react@^19.1.0/",
    "react-router-dom": "https://esm.sh/react-router-dom@6.25.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-primary bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(54,113,233,0.1),rgba(11,13,23,0))]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
